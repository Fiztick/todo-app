services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: todo
    depends_on:
      - postgres
    
  frontend:
      build: ./frontend
      ports:
        - "3000:3000"
      environment:
        NEXT_PUBLIC_API_URL: http://localhost:8080
      depends_on:
        - backend

volumes:
  pgdata: